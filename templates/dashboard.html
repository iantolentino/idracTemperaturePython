<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>iDRAC Monitor</title>
<meta name="viewport" content="width=device-width">

<!-- ✅ LOCAL CHART.JS -->
<script src="/static/chart.umd.min.js"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e5e7eb;
  font-family:system-ui,Segoe UI;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,260px);
  gap:14px;
}
.card{
  background:#161b22;
  border:1px solid #30363d;
  border-radius:14px;
  padding:12px;
}
.temp{
  font-size:44px;
  font-weight:900;
}
.ok{color:#10b981}
.warn{color:#f59e0b}
.crit{color:#ef4444}
small{color:#9ca3af}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}

button,select{
  padding:6px 10px;
  border-radius:8px;
  background:#161b22;
  color:#e5e7eb;
  border:1px solid #30363d;
  cursor:pointer;
}

.chart-wrap{
  position:relative;
  height:240px;   /* ✅ fixed height */
  width:100%;
}

#logs{
  display:none;
  max-height:260px;
  overflow:auto;
  background:#010409;
  border:1px solid #30363d;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>
<div class="wrap">

<h2>iDRAC Inlet Temperature</h2>

<!-- TEMPERATURE CARDS -->
<div id="cards" class="grid"></div>

<!-- GRAPH -->
<div class="card" style="margin-top:12px">
  <div class="controls">
    <select id="serverSelect"></select>
    <button onclick="loadGraph()">Update Graph</button>
  </div>
  <div class="chart-wrap">
    <canvas id="chartCanvas"></canvas>
  </div>
</div>

<!-- LOGS -->
<div class="card" style="margin-top:12px">
  <div class="controls">
    <button onclick="toggleLogs()">View Logs</button>
    <button onclick="downloadLogs()">Download CSV</button>
  </div>
  <pre id="logs"></pre>
</div>

</div>

<script>
let chart = null;
let initialized = false;

async function loadState(){
  const state = await (await fetch('/api/state',{cache:'no-store'})).json();
  const cards = document.getElementById('cards');
  const select = document.getElementById('serverSelect');
  const current = select.value;

  cards.innerHTML='';

  if(!initialized){
    select.innerHTML='';
    Object.keys(state).forEach(h=>{
      let o=document.createElement('option');
      o.value=h;
      o.textContent=h;
      select.appendChild(o);
    });
    initialized=true;
  }

  if(current) select.value=current;

  Object.entries(state).forEach(([h,s])=>{
    const cls=s.status==="CRITICAL"?"crit":s.status==="WARNING"?"warn":"ok";
    cards.innerHTML+=`
      <div class="card">
        <b>${h}</b>
        <div class="temp ${cls}">${s.temp ?? '--'}°C</div>
        <div class="${cls}">${s.status}</div>
        <small>${s.timestamp}</small>
      </div>
    `;
  });
}

async function loadGraph(){
  const host=serverSelect.value;
  if(!host) return;

  const pts=await (await fetch(`/api/history?host=${host}`,{cache:'no-store'})).json();
  if(!pts.length) return;

  const labels=pts.map(p=>p.t.slice(11,16));
  const data=pts.map(p=>Number(p.v));

  if(chart) chart.destroy();

  chart=new Chart(
    document.getElementById('chartCanvas'),
    {
      type:'line',
      data:{
        labels:labels,
        datasets:[{
          label:`${host} – last 1h`,
          data:data,
          borderColor:'#3b82f6',
          backgroundColor:'rgba(59,130,246,.2)',
          fill:true,
          tension:0.3,
          pointRadius:2
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        animation:false
      }
    }
  );
}

async function toggleLogs(){
  const box=document.getElementById('logs');
  if(box.style.display==='block'){box.style.display='none';return;}
  const h=serverSelect.value;
  const lines=await (await fetch(`/api/logs?host=${h}`)).json();
  box.textContent=lines.join('');
  box.style.display='block';
}

function downloadLogs(){
  window.location=`/api/export?host=${serverSelect.value}`;
}

loadState();
setInterval(loadState,5000);
setTimeout(loadGraph,1500);
</script>

</body>
</html>
